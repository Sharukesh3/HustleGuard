name: Trigger auto deployment for kafka-worker-container

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/kafka-worker-container-AutoDeployTrigger-a65e0f0c-80dc-4c3f-bcad-4576e0ad5883.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.KAFKAWORKERCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.KAFKAWORKERCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.KAFKAWORKERCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}backend/Dockerfile.worker
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: hustleguardregistry.azurecr.io
          registryUsername: ${{ secrets.KAFKAWORKERCONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.KAFKAWORKERCONTAINER_REGISTRY_PASSWORD }}
          containerAppName: kafka-worker-container
          resourceGroup: HustleGuard
          imageToBuild: hustleguardregistry.azurecr.io/kafka-worker-container:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


