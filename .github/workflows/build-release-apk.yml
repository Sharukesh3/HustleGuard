name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Trigger on tag push matching v*, e.g., v1.0.0

jobs:
  build:
    name: Build and Publish Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gig-protect # Since the expo app is inside gig-protect
    
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build APK on EAS Cloud
        run: eas build --platform android --profile github-release --non-interactive --wait --output ./app-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: gig-protect/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
